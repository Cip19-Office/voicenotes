<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0f0f0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="VoiceNotes"/>
<title>VoiceNotes</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f0f0f;color:#e0e0e0;font-family:'Courier New',monospace;-webkit-tap-highlight-color:transparent;overflow:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#1a1a1a}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
input,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none;box-sizing:border-box}
input:focus,textarea:focus{outline:none}
textarea{resize:none}
button{cursor:pointer;border:none;background:none}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh}
#header{display:flex;align-items:center;padding:0 16px;height:52px;border-bottom:1px solid #1a1a1a;flex-shrink:0;gap:8px}
#header h1{font-size:18px;font-weight:900;letter-spacing:-1px;color:#fff;text-transform:uppercase}
#header .spacer{flex:1}
#header .note-count{font-size:10px;color:#383838;letter-spacing:1px}
#toolbar{display:flex;align-items:center;gap:6px}

/* Tab bar */
#tabbar{display:flex;height:56px;border-top:1px solid #1e1e1e;background:#111;flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#555;font-size:9px;letter-spacing:1px;transition:color .2s;border:none;background:none}
.tab-btn.active{color:#e8433a}
.tab-icon{font-size:20px;line-height:1}

/* Panels */
#panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column}
.panel.active{display:flex}

/* Record panel */
#rec-panel{padding:16px 20px 20px;align-items:stretch}
#rec-center{display:flex;flex-direction:column;align-items:center;padding:20px 0 16px}
#rec-btn{width:84px;height:84px;border-radius:50%;background:#1c1c1c;border:3px solid #2e2e2e;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;flex-shrink:0}
#rec-btn.active{background:#e8433a;border-color:#ff6b65;box-shadow:0 0 40px rgba(232,67,58,.4)}
#rec-dot{width:28px;height:28px;border-radius:50%;background:#e8433a}
#rec-stop{width:26px;height:26px;border-radius:4px;background:#fff;display:none}
#rec-btn.active #rec-dot{display:none}
#rec-btn.active #rec-stop{display:block}
#rec-status{margin-top:14px;height:18px;display:flex;align-items:center;gap:8px;font-size:10px;color:#3a3a3a;letter-spacing:2px}
#rec-timer{font-size:13px;color:#e8433a;letter-spacing:1px;display:none}
#rec-pulse{width:7px;height:7px;border-radius:50%;background:#e8433a;display:none;animation:pulse 1s infinite}

/* Waveform */
#waveform{display:flex;align-items:center;gap:3px;height:40px;margin-top:10px}
.wave-bar{width:3px;border-radius:2px;background:#2e2e2e;height:5px;transition:background .3s}
#rec-btn.active~#rec-status~#waveform .wave-bar{background:#e8433a}

/* Live transcript */
#live-box{background:#131313;border:1px solid #1e1e1e;border-radius:10px;padding:14px;flex:1;overflow-y:auto;margin-bottom:12px;display:none}
#live-label{font-size:10px;color:#444;letter-spacing:2px;margin-bottom:8px}
#live-text{font-size:13px;line-height:1.75;color:#ccc;white-space:pre-wrap;word-break:break-word}
#live-interim{color:#555}

/* Save panel */
#save-panel{display:none;flex-direction:column;gap:10px;flex:1}
#error-box{background:#110a00;border:1px solid #4a2800;border-radius:10px;padding:14px;display:none}
#error-title{font-size:11px;color:#e8943a;margin-bottom:6px;letter-spacing:.5px}
#error-msg{font-size:11px;color:#a06030;line-height:1.7}
#transcript-box{background:#131313;border:1px solid #1e1e1e;border-radius:10px;padding:14px;max-height:140px;overflow-y:auto;display:none}
#transcript-label{font-size:10px;color:#444;letter-spacing:2px;margin-bottom:8px}
#transcript-text{font-size:13px;line-height:1.75;color:#ccc;white-space:pre-wrap;word-break:break-word}
#manual-label{font-size:10px;color:#555;letter-spacing:1px}
#manual-input{flex:1;min-height:80px;background:#161616;border:1px solid #252525;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:13px;line-height:1.7;width:100%}
#save-title{width:100%;background:#161616;border:1px solid #252525;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:13px}
#save-title::placeholder,#manual-input::placeholder{color:#444}
#save-btns{display:flex;gap:8px}

/* Manual shortcut */
#manual-shortcut{margin-top:auto;background:none;border:1px dashed #252525;border-radius:8px;padding:10px;color:#444;font-size:11px;letter-spacing:1px;width:100%;display:none}

/* Notes list */
#notes-panel{padding:0}
#notes-header{padding:16px 20px 8px;font-size:10px;color:#383838;letter-spacing:2px;flex-shrink:0}
#notes-list{flex:1;overflow-y:auto}
.note-item{padding:14px 20px;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid #141414;transition:all .15s}
.note-item.active{background:#181818;border-left-color:#e8433a}
.note-title{font-size:13px;font-weight:500;color:#bbb;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item.active .note-title{color:#fff}
.note-date{font-size:10px;color:#444;margin-bottom:5px}
.note-preview{font-size:11px;color:#555;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.note-dur{margin-top:5px;font-size:10px;color:#333}
#notes-empty{padding:32px 20px;font-size:12px;color:#333;line-height:1.8;text-align:center}

/* Note detail */
#detail-panel{padding:16px 20px 80px}
#back-btn{background:none;border:none;color:#555;font-size:12px;font-family:inherit;cursor:pointer;letter-spacing:1px;margin-bottom:16px;padding:0;letter-spacing:1px}
#detail-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:4px;text-transform:uppercase}
#detail-meta{font-size:10px;color:#444;margin-bottom:16px}
#detail-body{background:#131313;border:1px solid #1e1e1e;border-radius:12px;padding:16px;margin-bottom:14px;min-height:160px}
#detail-text{font-size:13px;line-height:1.85;color:#c8c8c8;white-space:pre-wrap;word-break:break-word}
#detail-edit-text{width:100%;min-height:200px;background:transparent;border:none;color:#d0d0d0;font-size:13px;font-family:inherit;line-height:1.8;padding:0;display:none}
#detail-btns{display:flex;gap:8px;flex-wrap:wrap}
#detail-empty{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:10px;color:#252525;font-size:10px;letter-spacing:2px}

/* Buttons */
.btn{padding:7px 11px;background:#1c1c1c;color:#888;border:1px solid #252525;border-radius:8px;font-size:11px;font-family:inherit;letter-spacing:.5px;transition:all .15s;white-space:nowrap}
.btn:disabled{background:#1a1a1a;color:#3a3a3a;cursor:default}
.btn.accent{background:#e8433a;color:#fff;border-color:#ff6b65}
.btn.accent:disabled{background:#1a1a1a;color:#3a3a3a;border-color:#252525}
.btn.danger{background:#200e0e;color:#d95555;border-color:#3d1111}
.btn.green{background:#091a15;color:#3db882;border-color:#193d2a}
.btn.lg{padding:10px 16px}

/* Drive indicator */
#drive-dot{width:6px;height:6px;border-radius:50%;background:#2a2a2a;transition:background .3s}
#drive-dot.on{background:#3db882}
#drive-label{font-size:10px;color:#3a3a3a;letter-spacing:.5px}
#drive-label.on{color:#3db882}

/* Toast */
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid #2e2e2e;border-radius:8px;padding:10px 18px;font-size:12px;color:#ccc;z-index:300;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
#toast.show{opacity:1}

/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
#modal-overlay.show{display:flex}
#modal{background:#161616;border:1px solid #252525;border-radius:14px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
#modal h3{font-size:16px;font-weight:900;color:#fff;margin-bottom:8px;text-transform:uppercase;letter-spacing:-0.5px}
#modal p{font-size:12px;color:#666;line-height:1.7;margin-bottom:16px}
#modal a{color:#e8433a}
#modal input{width:100%;background:#111;border:1px solid #252525;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:12px;margin-bottom:12px}
#modal input::placeholder{color:#444}
#modal-btns{display:flex;gap:8px}
#modal-type{font-size:10px;color:#383838;margin-bottom:12px;letter-spacing:1px}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes wave0{0%{height:8px}100%{height:32px}}
@keyframes wave1{0%{height:12px}100%{height:22px}}
@keyframes wave2{0%{height:6px}100%{height:38px}}
@keyframes wave3{0%{height:14px}100%{height:18px}}
@keyframes wave4{0%{height:10px}100%{height:28px}}
.wave-bar.anim{background:#e8433a!important}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>VoiceNotes</h1>
    <div class="spacer"></div>
    <div id="toolbar">
      <div id="drive-dot"></div>
      <span id="drive-label">DRIVE</span>
      <button class="btn" id="drive-btn" onclick="driveClick()">Drive</button>
      <button class="btn" id="export-btn" onclick="showExport()">Export</button>
    </div>
    <span class="note-count" id="note-count">0 notes</span>
  </div>

  <div id="panels">
    <!-- Record Panel -->
    <div class="panel active" id="rec-panel">
      <div id="rec-center">
        <div id="rec-btn" onclick="toggleRec()">
          <div id="rec-dot"></div>
          <div id="rec-stop"></div>
        </div>
        <div id="rec-status">
          <div id="rec-pulse"></div>
          <span id="rec-timer">00:00</span>
          <span id="rec-hint">TAP TO RECORD</span>
        </div>
        <div id="waveform"></div>
      </div>

      <div id="live-box">
        <div id="live-label">LIVE TRANSCRIPT</div>
        <div id="live-text"><span id="live-final"></span><span id="live-interim"></span><span id="live-hint" style="color:#333">Start speaking…</span></div>
      </div>

      <div id="save-panel">
        <div id="error-box">
          <div id="error-title"></div>
          <div id="error-msg"></div>
        </div>
        <div id="transcript-box">
          <div id="transcript-label">TRANSCRIPT</div>
          <div id="transcript-text"></div>
        </div>
        <div id="manual-label">TYPE YOUR NOTE</div>
        <textarea id="manual-input" placeholder="Type your note here…" rows="4"></textarea>
        <input id="save-title" type="text" placeholder="Note title (optional)"/>
        <div id="save-btns">
          <button class="btn accent lg" id="save-btn" onclick="saveNote()" disabled>SAVE NOTE</button>
          <button class="btn lg" onclick="discardNote()">DISCARD</button>
        </div>
      </div>

      <button id="manual-shortcut" onclick="openManual()">+ TYPE A NOTE MANUALLY</button>
    </div>

    <!-- Notes List Panel -->
    <div class="panel" id="notes-panel">
      <div id="notes-header">ALL NOTES</div>
      <div id="notes-list">
        <div id="notes-empty">No notes yet.<br>Tap the mic to record.</div>
      </div>
    </div>

    <!-- Detail Panel -->
    <div class="panel" id="detail-panel">
      <button id="back-btn" onclick="showTab('notes')">← BACK</button>
      <div id="detail-content">
        <div id="detail-empty">
          <span style="font-size:40px">🎙</span>
          <span>SELECT A NOTE</span>
        </div>
      </div>
    </div>
  </div>

  <div id="tabbar">
    <button class="tab-btn active" id="tab-record" onclick="showTab('record')"><span class="tab-icon">⏺</span><span>REC</span></button>
    <button class="tab-btn" id="tab-notes" onclick="showTab('notes')"><span class="tab-icon">📋</span><span>NOTES</span></button>
    <button class="tab-btn" id="tab-detail" onclick="showTab('detail')"><span class="tab-icon">📄</span><span>NOTE</span></button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <div id="modal-type"></div>
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <input id="modal-input" type="text" style="display:none"/>
    <div id="modal-btns"></div>
  </div>
</div>

<script>
/* ── State ── */
let notes = [];
let activeNoteId = null;
let recording = false;
let elapsed = 0;
let timerInterval = null;
let speechBase = "";
let speechSessionFinal = "";
let speechActive = false;
let recognition = null;
let driveToken = null;
let driveFileId = localStorage.getItem("vn-dfid") || null;
let driveConnected = false;
let toastTimer = null;
let editingNote = false;

/* ── Init ── */
(function init(){
  try { notes = JSON.parse(localStorage.getItem("vn-notes") || "[]"); } catch { notes = []; }
  buildWaveform();
  renderNotes();
  updateUI();
  initSpeech();
})();

/* ── Helpers ── */
function fmt(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0) return h+":"+pad(m%60)+":"+pad(s%60);
  return pad(m)+":"+pad(s%60);
}
function pad(n){ return String(n).padStart(2,"0"); }
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
function save(){ localStorage.setItem("vn-notes", JSON.stringify(notes)); }
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
}

/* ── Tab Navigation ── */
function showTab(tab){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById((tab==="record"?"rec":tab)+"-panel").classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
}

/* ── Waveform ── */
function buildWaveform(){
  const wf=document.getElementById("waveform");
  for(let i=0;i<24;i++){
    const b=document.createElement("div");
    b.className="wave-bar";
    b.dataset.i=i;
    wf.appendChild(b);
  }
}
function animateWave(on){
  document.querySelectorAll(".wave-bar").forEach((b,i)=>{
    if(on){
      b.classList.add("anim");
      b.style.animation="wave"+(i%5)+" "+(0.6+(i%4)*0.15)+"s ease-in-out infinite alternate";
      b.style.animationDelay=(i*0.05).toFixed(2)+"s";
    } else {
      b.classList.remove("anim");
      b.style.animation="none";
      b.style.height="5px";
    }
  });
}

/* ── Speech Recognition ── */
function initSpeech(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = "en-GB";

  recognition.onresult = function(e){
    let fin="", inter="";
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal) fin += e.results[i][0].transcript+" ";
      else inter = e.results[i][0].transcript;
    }
    speechSessionFinal = fin;
    const full = speechBase + fin;
    document.getElementById("live-final").textContent = full;
    document.getElementById("live-interim").textContent = inter;
    document.getElementById("live-hint").style.display = full||inter ? "none" : "inline";
  };

  recognition.onerror = function(e){
    if(e.error==="not-allowed"||e.error==="service-not-allowed"){
      const isHttps = location.protocol==="https:"||location.hostname==="localhost";
      stopRecording(isHttps ? "permission" : "https");
    }
    // other errors: onend will restart
  };

  recognition.onend = function(){
    document.getElementById("live-interim").textContent = "";
    if(speechActive){
      // commit session, restart fresh
      speechBase = speechBase + speechSessionFinal;
      speechSessionFinal = "";
      document.getElementById("live-final").textContent = speechBase;
      try{ recognition.start(); }catch(e){}
    }
  };
}

/* ── Recording ── */
function toggleRec(){
  if(recording) stopRecording("");
  else startRecording();
}

function startRecording(){
  speechBase = "";
  speechSessionFinal = "";
  speechActive = true;
  recording = true;
  elapsed = 0;

  document.getElementById("rec-btn").classList.add("active");
  document.getElementById("rec-hint").style.display = "none";
  document.getElementById("rec-pulse").style.display = "block";
  document.getElementById("rec-timer").style.display = "block";
  document.getElementById("live-box").style.display = "block";
  document.getElementById("live-final").textContent = "";
  document.getElementById("live-interim").textContent = "";
  document.getElementById("live-hint").style.display = "inline";
  document.getElementById("save-panel").style.display = "none";
  document.getElementById("manual-shortcut").style.display = "none";
  animateWave(true);

  timerInterval = setInterval(()=>{
    elapsed += 500;
    document.getElementById("rec-timer").textContent = fmt(elapsed);
  }, 500);

  if(recognition){
    try{ recognition.start(); }catch(e){}
  }
}

function stopRecording(errType){
  speechActive = false;
  recording = false;
  clearInterval(timerInterval);

  if(recognition){ try{ recognition.stop(); }catch(e){} }

  document.getElementById("rec-btn").classList.remove("active");
  document.getElementById("rec-hint").style.display = "none";
  document.getElementById("rec-pulse").style.display = "none";
  document.getElementById("rec-timer").style.display = "none";
  document.getElementById("live-box").style.display = "none";
  animateWave(false);

  // Commit last session
  const finalText = (speechBase + speechSessionFinal).trim();

  showSavePanel(finalText, errType);
}

function showSavePanel(transcriptText, errType){
  const sp = document.getElementById("save-panel");
  sp.style.display = "flex";
  document.getElementById("manual-shortcut").style.display = "none";
  document.getElementById("manual-input").value = "";
  document.getElementById("save-title").value = "";

  // Error
  const eb = document.getElementById("error-box");
  if(errType==="https"){
    document.getElementById("error-title").textContent = "⚠ HTTPS REQUIRED";
    document.getElementById("error-msg").textContent = "Mic only works on HTTPS. Use https://cip19-office.github.io/voicenotes/ in Chrome. Type your note manually below.";
    eb.style.display = "block";
  } else if(errType==="permission"){
    document.getElementById("error-title").textContent = "⚠ MIC PERMISSION DENIED";
    document.getElementById("error-msg").textContent = "Tap 🔒 in Chrome address bar → Site settings → allow Microphone → refresh.";
    eb.style.display = "block";
  } else {
    eb.style.display = "none";
  }

  // Transcript
  const tb = document.getElementById("transcript-box");
  if(transcriptText){
    document.getElementById("transcript-text").textContent = transcriptText;
    document.getElementById("manual-label").textContent = "ADD / EDIT CONTENT";
    document.getElementById("manual-input").placeholder = "Add more text…";
    tb.style.display = "block";
  } else {
    document.getElementById("manual-label").textContent = "TYPE YOUR NOTE";
    document.getElementById("manual-input").placeholder = "Type your note here…";
    tb.style.display = "none";
  }

  document.getElementById("manual-input").oninput = updateSaveBtn;
  updateSaveBtn();
}

function updateSaveBtn(){
  const transcript = (speechBase + speechSessionFinal).trim();
  const manual = document.getElementById("manual-input").value.trim();
  document.getElementById("save-btn").disabled = !(transcript || manual);
}

function saveNote(){
  const transcript = (speechBase + speechSessionFinal).trim();
  const manual = document.getElementById("manual-input").value.trim();
  const text = transcript + (transcript && manual ? "\n" : "") + manual;
  if(!text) return;

  const title = document.getElementById("save-title").value.trim() || "Note "+new Date().toLocaleDateString("en-GB");
  const note = {id:Date.now(), title, text, duration:elapsed, createdAt:new Date().toISOString()};
  notes.unshift(note);
  save();
  renderNotes();
  updateUI();

  // Reset
  document.getElementById("save-panel").style.display = "none";
  document.getElementById("manual-shortcut").style.display = "block";
  speechBase=""; speechSessionFinal="";

  if(driveConnected) syncDrive();
  showToast("Note saved ✓");
  openNote(note.id);
  showTab("detail");
}

function discardNote(){
  document.getElementById("save-panel").style.display = "none";
  document.getElementById("manual-shortcut").style.display = "block";
  speechBase=""; speechSessionFinal="";
}

function openManual(){
  showSavePanel("", "");
}

function updateUI(){
  const c = notes.length;
  document.getElementById("note-count").textContent = c+" note"+(c!==1?"s":"");
  // show manual shortcut if not recording and no save panel
  const sp = document.getElementById("save-panel");
  if(!recording && sp.style.display==="none"){
    document.getElementById("manual-shortcut").style.display = "block";
  }
}

/* ── Notes List ── */
function renderNotes(){
  const list = document.getElementById("notes-list");
  const empty = document.getElementById("notes-empty");
  if(notes.length===0){ empty.style.display="block"; return; }
  empty.style.display="none";
  // Remove old items
  list.querySelectorAll(".note-item").forEach(el=>el.remove());
  notes.forEach(n=>{
    const div=document.createElement("div");
    div.className="note-item"+(activeNoteId===n.id?" active":"");
    div.dataset.id=n.id;
    div.innerHTML=
      '<div class="note-title">'+escHtml(n.title)+'<\/div>'+
      '<div class="note-date">'+fmtDate(n.createdAt)+'<\/div>'+
      '<div class="note-preview">'+escHtml(n.text)+'<\/div>'+
      '<div class="note-dur">⏱ '+fmt(n.duration)+'<\/div>';
    div.onclick=()=>{ openNote(n.id); showTab("detail"); };
    list.appendChild(div);
  });
}

function escHtml(s){ const d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML; }

/* ── Note Detail ── */
function openNote(id){
  activeNoteId=id;
  editingNote=false;
  document.querySelectorAll(".note-item").forEach(el=>{
    el.classList.toggle("active", el.dataset.id==id);
  });
  renderDetail();
}

function renderDetail(){
  const dc=document.getElementById("detail-content");
  const note=notes.find(n=>n.id===activeNoteId);
  if(!note){ dc.innerHTML='<div id="detail-empty" style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:10px;color:#252525;font-size:10px;letter-spacing:2px"><span style="font-size:40px">🎙<\/span><span>SELECT A NOTE<\/span><\/div>'; return; }

  dc.innerHTML=
    '<div style="margin-bottom:16px">'+
      '<div id="detail-title">'+escHtml(note.title)+'<\/div>'+
      '<div id="detail-meta">'+fmtDate(note.createdAt)+' · '+fmt(note.duration)+'<\/div>'+
    '<\/div>'+
    '<div id="detail-body">'+
      '<div id="detail-text" style="display:'+(editingNote?"none":"block")+'">'+escHtml(note.text)+'<\/div>'+
      '<textarea id="detail-edit-text" style="display:'+(editingNote?"block":"none")+';width:100%;min-height:200px;background:transparent;border:none;color:#d0d0d0;font-size:13px;font-family:inherit;line-height:1.8;padding:0;resize:none;outline:none">'+escHtml(note.text)+'<\/textarea>'+
    '<\/div>'+
    '<div id="detail-btns"><\/div>';

  renderDetailBtns(note);
}

function renderDetailBtns(note){
  const btns=document.getElementById("detail-btns");
  if(editingNote){
    btns.innerHTML=
      '<button class="btn accent" onclick="saveEdit()">Save<\/button>'+
      '<button class="btn" onclick="cancelEdit()">Cancel<\/button>';
  } else {
    btns.innerHTML=
      '<button class="btn" onclick="startEdit()">Edit<\/button>'+
      '<button class="btn" onclick="copyNote()">Copy<\/button>'+
      '<button class="btn green" onclick="shareNote()">Share ↗<\/button>'+
      '<button class="btn danger" onclick="deleteNote()">Delete<\/button>';
  }
}

function startEdit(){
  editingNote=true;
  document.getElementById("detail-text").style.display="none";
  document.getElementById("detail-edit-text").style.display="block";
  document.getElementById("detail-edit-text").focus();
  const note=notes.find(n=>n.id===activeNoteId);
  renderDetailBtns(note);
}
function cancelEdit(){
  editingNote=false;
  renderDetail();
}
function saveEdit(){
  const text=document.getElementById("detail-edit-text").value;
  notes=notes.map(n=>n.id===activeNoteId?Object.assign({},n,{text}):n);
  save(); editingNote=false; renderDetail(); renderNotes();
  if(driveConnected) syncDrive();
  showToast("Saved ✓");
}
function copyNote(){
  const note=notes.find(n=>n.id===activeNoteId);
  if(note) navigator.clipboard.writeText(note.text).then(()=>showToast("Copied ✓")).catch(()=>showToast("Copy failed"));
}
function shareNote(){
  const note=notes.find(n=>n.id===activeNoteId);
  if(!note) return;
  if(navigator.share) navigator.share({title:note.title,text:note.title+"\n"+fmtDate(note.createdAt)+"\n\n"+note.text}).catch(()=>{});
  else navigator.clipboard.writeText(note.text).then(()=>showToast("Copied ✓"));
}
function deleteNote(){
  notes=notes.filter(n=>n.id!==activeNoteId);
  activeNoteId=null; save(); renderNotes(); renderDetail(); updateUI();
  if(driveConnected) syncDrive();
  showTab("notes");
}

/* ── Export ── */
function showExport(){
  showModal("EXPORT NOTES",
    "Download all "+notes.length+" note"+(notes.length!==1?"s":"")+" to your device.",
    [
      {label:"Download .txt", accent:true, fn:()=>{ closeModal(); exportTxt(); }},
      {label:"Download .json", fn:()=>{ closeModal(); exportJson(); }},
      {label:"Cancel", fn:closeModal}
    ]
  );
}
function exportTxt(){
  const text=notes.map(n=>"=== "+n.title+" ===\n"+fmtDate(n.createdAt)+" | "+fmt(n.duration)+"\n\n"+n.text).join("\n\n---\n\n");
  dlFile("voicenotes.txt",text,"text/plain");
}
function exportJson(){
  dlFile("voicenotes.json",JSON.stringify(notes,null,2),"application/json");
}
function dlFile(name,content,type){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
}

/* ── Drive ── */
function driveClick(){
  if(driveConnected){ syncDrive(); return; }
  const saved=localStorage.getItem("vn-gcid")||"";
  showModal("GOOGLE DRIVE SYNC",
    "Notes are saved to a private App Data folder in your Drive.\n\nSetup: Go to console.cloud.google.com → Create project → APIs & Services → Credentials → Create OAuth 2.0 Client ID (Web app) → add your GitHub Pages URL to Authorised JavaScript origins → Enable Google Drive API → paste Client ID below.",
    [
      {label:"Connect", accent:true, fn:()=>{
        const cid=document.getElementById("modal-input").value.trim();
        if(!cid){ showToast("Enter a Client ID first"); return; }
        localStorage.setItem("vn-gcid",cid);
        closeModal();
        connectDrive(cid);
      }},
      {label:"Cancel", fn:closeModal}
    ],
    saved
  );
}

function connectDrive(clientId){
  if(!window.google||!window.google.accounts){ showToast("Google library loading, try again"); return; }
  const tc=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:"https://www.googleapis.com/auth/drive.appdata",
    callback:async resp=>{
      if(resp.error){ showToast("Auth error: "+resp.error); return; }
      driveToken=resp.access_token;
      driveConnected=true;
      document.getElementById("drive-dot").classList.add("on");
      document.getElementById("drive-label").classList.add("on");
      document.getElementById("drive-btn").textContent="Sync";
      showToast("Drive connected ✓");
      // Try to load existing backup
      try{
        const f=await driveList();
        if(f){
          driveFileId=f.id; localStorage.setItem("vn-dfid",f.id);
          const remote=await driveRead(f.id);
          if(Array.isArray(remote)&&remote.length){ notes=remote; save(); renderNotes(); updateUI(); showToast("Loaded "+remote.length+" notes ✓"); }
          else syncDrive();
        } else syncDrive();
      }catch{ showToast("Connected but couldn't load backup"); }
    }
  });
  tc.requestAccessToken();
}

async function driveList(){
  const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27voicenotes-backup.json%27&fields=files(id)",{headers:{Authorization:"Bearer "+driveToken}});
  const d=await r.json(); return d.files&&d.files[0]?d.files[0]:null;
}
async function driveRead(id){
  const r=await fetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media",{headers:{Authorization:"Bearer "+driveToken}});
  return r.json();
}
async function syncDrive(){
  if(!driveToken) return;
  try{
    const meta={name:"voicenotes-backup.json",mimeType:"application/json",...(driveFileId?{}:{parents:["appDataFolder"]})};
    const fd=new FormData();
    fd.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
    fd.append("file",new Blob([JSON.stringify(notes)],{type:"application/json"}));
    const url=driveFileId
      ?"https://www.googleapis.com/upload/drive/v3/files/"+driveFileId+"?uploadType=multipart"
      :"https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
    const r=await fetch(url,{method:driveFileId?"PATCH":"POST",headers:{Authorization:"Bearer "+driveToken},body:fd});
    const d=await r.json();
    if(d.id){ driveFileId=d.id; localStorage.setItem("vn-dfid",d.id); }
    showToast("Saved to Drive ✓");
  }catch{ showToast("Drive sync failed"); }
}

/* ── Modal ── */
function showModal(title, body, btns, inputVal){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-body").textContent=body;
  const inp=document.getElementById("modal-input");
  if(inputVal!==undefined){ inp.style.display="block"; inp.value=inputVal||""; inp.placeholder="Paste OAuth Client ID here"; }
  else inp.style.display="none";
  const mb=document.getElementById("modal-btns"); mb.innerHTML="";
  btns.forEach(b=>{
    const el=document.createElement("button");
    el.className="btn"+(b.accent?" accent":"")+" lg";
    el.textContent=b.label;
    el.onclick=b.fn;
    mb.appendChild(el);
  });
  document.getElementById("modal-overlay").classList.add("show");
}
function closeModal(){ document.getElementById("modal-overlay").classList.remove("show"); }
